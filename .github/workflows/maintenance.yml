name: maintenance

# Audit-first maintenance for centinelas-pr. Runs the maintenance tests and the
# audit-mode script, uploads the report as an artifact, and never auto-commits.

on:
  workflow_dispatch:
  schedule:
    - cron: "47 6 * * 1"   # Mondays 06:47 UTC

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          # PRII_FETCH_HUB: ensure shared federation libs resolve
          if [ ! -d ../thehub-pr ]; then git clone --depth 1 --branch "${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}" https://github.com/jotaele44/thehub-pr.git ../thehub-pr || git clone --depth 1 https://github.com/jotaele44/thehub-pr.git ../thehub-pr; fi
          command -v uv >/dev/null 2>&1 || python -m pip install -q uv
          uv pip install --system -e .[dev]
      - name: Maintenance tests
        run: python -m pytest tests/test_maintenance.py -q
      - name: Audit run
        run: python3 scripts/run_maintenance.py --repo centinelas-pr --mode audit --json
      - name: Upload maintenance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: centinelas-maintenance-report
          path: reports/maintenance/latest.json
          if-no-files-found: ignore
