name: skills-validation

# Focused, offline gate for the PRII skill packet. Runs the shared validator
# and the skill_contract tests with a minimal dependency set (no git-pinned
# federation packages), so the packet stays green independently of the full
# validate.yml matrix.

on:
  push:
    branches: [main]
    paths:
      - skill-registry.yaml
      - activation-matrix.yaml
      - dependency-graph.yaml
      - skills/**
      - scripts/validate_skills.py
      - schemas/prii_skill_contract.schema.json
      - tests/skill_contract/**
      - .github/workflows/skills-validation.yml
  pull_request:
    branches: [main]
    paths:
      - skill-registry.yaml
      - activation-matrix.yaml
      - dependency-graph.yaml
      - skills/**
      - scripts/validate_skills.py
      - schemas/prii_skill_contract.schema.json
      - tests/skill_contract/**
      - .github/workflows/skills-validation.yml
  workflow_dispatch:

jobs:
  skills-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install minimal deps
        run: python -m pip install pyyaml pytest jsonschema
      - name: Validate skill packet
        run: python scripts/validate_skills.py
      - name: Skill contract tests
        run: python -m pytest tests/skill_contract -q
