name: desktop-build

# Builds the standalone double-click desktop app (PyInstaller) for each OS.
# Runs on demand, and attaches the bundles to the release on desktop-v* tags.

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"
  pull_request:
    branches: [main]
    paths:
      - "desktop/**"
      - "requirements-desktop.txt"
      - ".github/workflows/desktop-build.yml"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend (same-origin)
        env:
          VITE_API_BASE: ""
        run: |
          npm ci --no-audit --no-fund
          npm run build
        working-directory: frontend

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . -r server/backend/requirements.txt -r requirements-desktop.txt pyinstaller

      - name: Freeze console build (for smoke test)
        env:
          PRII_CONSOLE: "1"
        run: pyinstaller desktop/pyinstaller.spec --distpath dist-smoke --noconfirm

      - name: Smoke test frozen app
        shell: python
        run: |
          import pathlib, subprocess, sys
          name = "PRII-CENTINELAS"
          exe = pathlib.Path("dist-smoke") / name / (name + (".exe" if sys.platform == "win32" else ""))
          result = subprocess.run([str(exe), "--smoke"], timeout=120)
          sys.exit(result.returncode)

      - name: Freeze desktop app (windowed release)
        run: pyinstaller desktop/pyinstaller.spec --distpath dist-desktop --noconfirm

      - name: Package bundle
        shell: bash
        run: |
          cd dist-desktop
          if [ "$RUNNER_OS" = "macOS" ] && [ -d "PRII-CENTINELAS.app" ]; then
            zip -qry "PRII-CENTINELAS-${RUNNER_OS}.zip" "PRII-CENTINELAS.app"
          else
            7z a -bd "PRII-CENTINELAS-${RUNNER_OS}.zip" "PRII-CENTINELAS" > /dev/null
          fi

      - name: Package .dmg (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd dist-desktop
          staging="dmg-staging"
          rm -rf "$staging" && mkdir "$staging"
          cp -R "PRII-CENTINELAS.app" "$staging/"
          ln -s /Applications "$staging/Applications"
          hdiutil create -volname "PRII-CENTINELAS" -srcfolder "$staging" \
            -ov -format UDZO "PRII-CENTINELAS-macOS.dmg"
          rm -rf "$staging"

      - uses: actions/upload-artifact@v4
        with:
          name: PRII-CENTINELAS-${{ runner.os }}
          path: |
            dist-desktop/PRII-CENTINELAS-*.zip
            dist-desktop/PRII-CENTINELAS-*.dmg

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-desktop/PRII-CENTINELAS-*.zip
            dist-desktop/PRII-CENTINELAS-*.dmg
