# OpenAI-runtime agent manifest for prii-check-producer-contract.
# SKILL.md is canonical; keep fields synced with skill-registry.yaml.
schema_version: prii_openai_agent_v1
name: prii-check-producer-contract
description: >-
  Read-only compatibility check of Centinelas's local producer contract against
  the shared PRII contract (and Hub-owned schemas when available). Reports the
  manifest, commands, outputs, readiness, and schema/boundary checks, and flags
  divergences without asserting unverifiable Hub-side compatibility.
instructions_ref: ../SKILL.md
owner_repo: jotaele44/centinelas-pr
default_mode: read_only
allowed_modes: [read_only]
command_ids: []
stop_conditions:
  - local contract diverges from the Hub contract
result_envelope:
  - status
  - commands_considered
  - commands_run
  - artifacts
  - blockers
  - contradictions
  - next_safe_action
